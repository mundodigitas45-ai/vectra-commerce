services:
  vectra-commerce-api:
    container_name: vectra-commerce-api
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - vectra-commerce-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  vectra-commerce-network:
    name: vectra-commerce-network
    driver: bridge
